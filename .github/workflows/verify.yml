# Verify workflow - runs linting and tests
# Triggered on PRs and reusable by other workflows
#
# This workflow is designed to be:
# 1. Required in branch protection (blocks PRs if failing)
# 2. Called by release.yml before deploying
#
# Jobs run in parallel:
# - lint-and-test: linting, type-checking, unit tests, database tests
# - e2e: Playwright E2E tests (uses Testcontainers for ephemeral PostgreSQL)
#
# Both jobs are required status checks in branch protection.

name: Verify

on:
  # Trigger on pull requests to main
  pull_request:
    branches: [main]

  # Allow other workflows to call this one
  workflow_call:

# Cancel superseded runs for the same PR to save CI minutes
concurrency:
  group: verify-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check types
        run: pnpm check-types

      - name: Run linting
        run: pnpm lint

      - name: Run unit tests
        run: pnpm test

      - name: Run integration tests
        run: pnpm test:integration

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Get Playwright version
        id: playwright-version
        run: |
          # Get version from package.json, strip semver range prefix (^, ~)
          VERSION=$(node -p "require('./package.json').devDependencies['@playwright/test'].replace(/^[^0-9]*/, '')")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Playwright version for cache: $VERSION"

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      # Cache downloaded .deb packages to a user-writable directory.
      # /var/cache/apt/archives can't be cached directly — its lock/partial
      # files are root-owned and cause tar permission errors on save.
      - name: Cache Playwright apt dependencies
        uses: actions/cache@v4
        id: apt-cache
        with:
          path: /tmp/playwright-apt-cache
          key: apt-playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      - name: Restore apt packages from cache
        if: steps.apt-cache.outputs.cache-hit == 'true'
        run: sudo cp /tmp/playwright-apt-cache/*.deb /var/cache/apt/archives/ 2>/dev/null || true

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install --with-deps

      - name: Install Playwright deps (cached browsers)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pnpm exec playwright install-deps

      - name: Save apt packages to cache
        if: steps.apt-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p /tmp/playwright-apt-cache
          sudo cp /var/cache/apt/archives/*.deb /tmp/playwright-apt-cache/ 2>/dev/null || true

      - name: Run E2E tests
        run: pnpm test:e2e

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
